name: motion_sickness_stabilizer
description: >-
  Reduce motion sickness while using a phone in a moving vehicle — sensor-driven
  vehicle motion cues (animated dots), an artificial horizon and a focus dot,
  plus an Android system overlay that floats the cues over any app.
version: 0.4.1
homepage: https://github.com/arbaan-max/motion_sickness_stabilizer
repository: https://github.com/arbaan-max/motion_sickness_stabilizer
issue_tracker: https://github.com/arbaan-max/motion_sickness_stabilizer/issues
topics: [motion-sickness, sensors, overlay, accessibility, motion]

environment:
  sdk: ^3.11.5
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# This package is a plugin: it ships Dart code AND native Android code.
flutter:
  plugin:
    platforms:
      android:
        package: com.kaizenque.motion_sickness_stabilizer
        pluginClass: MotionSicknessStabilizerPlugin
